<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gastos Semanales</title>

    <link rel="icon" href="icono-192.png">
    <link rel="stylesheet" href="style.css">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4CAF50">

</head>

<body>

<div id="app">

    <h1>Control de Gastos</h1>

    <!-- PANTALLA 1 -->
    <div id="pantallaSemanas">

        <h2>Selecciona Semana</h2>

        <button class="boton" onclick="seleccionarSemana(1)">Semana 1</button>
        <button class="boton" onclick="seleccionarSemana(2)">Semana 2</button>
        <button class="boton" onclick="seleccionarSemana(3)">Semana 3</button>
        <button class="boton" onclick="seleccionarSemana(4)">Semana 4</button>

    </div>


    <!-- PANTALLA 2 -->
    <div id="pantallaDias" style="display:none">

        <h2 id="tituloSemana"></h2>
        <h3>Selecciona Día</h3>

        <div class="gridDias">

            <button class="diaBtn" onclick="seleccionarDia(1)">Lunes</button>
            <button class="diaBtn" onclick="seleccionarDia(2)">Martes</button>
            <button class="diaBtn" onclick="seleccionarDia(3)">Miércoles</button>

            <button class="diaBtn" onclick="seleccionarDia(4)">Jueves</button>
            <button class="diaBtn" onclick="seleccionarDia(5)">Viernes</button>
            <button class="diaBtn" onclick="seleccionarDia(6)">Sábado</button>

        </div>

        <hr>

        <button class="boton" onclick="mostrarDetalle()">Detalle Semana</button>
        <button class="boton" onclick="mostrarResumen()">Resumen Semana</button>

        <div id="resultadoSemana"></div>

        <br>

        <button class="boton" onclick="volverSemanas()">Volver a Semanas</button>

    </div>


    <!-- PANTALLA 3 -->
    <div id="pantallaCarga" style="display:none">

        <h2 id="tituloDia"></h2>

        <label for="daniMonto">Dani $</label>
        <input id="daniMonto" type="number">

        <!-- 🔄 CAMBIADO -->
        <label for="gabiMonto">Papá $</label>
        <input id="gabiMonto" type="number">

        <!-- 🔄 CAMBIADO -->
        <label for="papaMonto">Gabi $</label>
        <input id="papaMonto" type="number">

        <br><br>

        <label for="daniCant">Comensales Dani</label>
        <input id="daniCant" type="number">

        <!-- 🔄 CAMBIADO -->
        <label for="gabiCant">Comensales Papá</label>
        <input id="gabiCant" type="number">

        <!-- 🔄 CAMBIADO -->
        <label for="papaCant">Comensales Gabi</label>
        <input id="papaCant" type="number">

        <br><br>

        <button class="boton" onclick="guardarDia()">Guardar</button>
        <button class="boton" onclick="volverDias()">Volver</button>
        <button class="boton boton-limpiar" onclick="limpiarCampos()">Limpiar</button>
        
        <div id="resultado"></div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
